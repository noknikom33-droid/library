<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>SLS · ระบบห้องสมุดโรงเรียน</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <!-- SLS styles (แยกจาก Styles.html + Styles2.html เดิม) -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Boot loader -->
  <div id="boot-loader" class="boot-loader">
    <div class="bl-card">
      <div class="bl-logo"><i class="bi bi-book-half"></i></div>
      <div class="bl-title">SLS · ระบบห้องสมุดโรงเรียน</div>
      <div class="bl-sub" id="bl-text">กำลังเริ่มต้นระบบ...</div>
      <div class="bl-dots"><span></span><span></span><span></span></div>
    </div>
  </div>

  <!-- App root -->
  <div id="app-root"></div>

  <!-- Hosts (modal, toast, spinner) — singletons -->
  <div id="modal-host"></div>
  <div id="toast-host"></div>
  <div id="spinner-overlay" class="spinner-overlay" hidden>
    <div class="spn">
      <div class="spn-ring r1"></div>
      <div class="spn-ring r2"></div>
      <div class="spn-ring r3"></div>
      <div class="spn-core"><i class="bi bi-book-half"></i></div>
    </div>
    <div class="spn-text" id="spn-text">กำลังประมวลผล...</div>
    <div class="spn-stages" id="spn-stages"></div>
    <div class="spn-sweep"><div class="spn-sweep-bar"></div></div>
  </div>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.all.min.js"></script>

  <!-- SLS app (แยกจาก ScriptsCore.html + ScriptsPages.html เดิม · เปลี่ยน google.script.run → fetch) -->
  <script src="app.js"></script>
</body>
</html>
